    antworten: ["Niedrige Dosis analgesiert, mittlere Dosis sediert, hohe Dosis kann zur Anästhesie beitragen", "Es ist nur ein Antiemetikum", "Es darf beim Trauma nie gegeben werden", "Es ist nur oral einsetzbar"],

let aktuelleFragen = [...fragen];
let falschBeantwortet = [];
let index = 0;
let punktzahl = 0;
let timer;
let zeit = 120;
let beantwortet = false;
let gesamtGestellt = 0;

function updateProgress() {
  document.getElementById("progress").innerText =
    "Direkt richtig: " + punktzahl + " von " + fragen.length +
    " | Aktuelle Runde: Frage " + (index + 1) + " von " + aktuelleFragen.length;
}

function zeigeFrage() {
  if (index >= aktuelleFragen.length) {
    if (falschBeantwortet.length > 0) {
      aktuelleFragen = [...falschBeantwortet];
      falschBeantwortet = [];
      index = 0;
      alert("Jetzt kommen die falsch beantworteten Fragen erneut.");
    } else {
      quizBeenden();
      return;
    }
  }

  beantwortet = false;
  zeit = 120;
  clearInterval(timer);
  gesamtGestellt++;

  document.getElementById("feedback").innerText = "";
  document.getElementById("explanation").innerText = "";
  document.getElementById("nextBtn").classList.add("hidden");

  const frageObj = aktuelleFragen[index];
  document.getElementById("frage").innerText = frageObj.frage;

  const antwortenBox = document.getElementById("antworten");
  antwortenBox.innerHTML = "";

  frageObj.antworten.forEach((antwort, i) => {
    const btn = document.createElement("button");
    btn.innerText = antwort;
    btn.className = "answer-btn";
    btn.onclick = () => pruefeAntwort(i);
    antwortenBox.appendChild(btn);
  });

  document.getElementById("timer").innerText = "Zeit: 120";
  updateProgress();

  timer = setInterval(() => {
    zeit--;
    document.getElementById("timer").innerText = "Zeit: " + zeit;
    if (zeit <= 0) {
      clearInterval(timer);
      zeitAbgelaufen();
    }
  }, 1000);
}

function pruefeAntwort(auswahl) {
  if (beantwortet) return;
  beantwortet = true;
  clearInterval(timer);

  const frageObj = aktuelleFragen[index];
  const buttons = document.querySelectorAll(".answer-btn");

  buttons.forEach((btn, i) => {
    btn.classList.add("disabled");
    if (i === frageObj.richtig) btn.classList.add("correct");
  });

  if (auswahl === frageObj.richtig) {
    document.getElementById("feedback").innerText = "Richtig";
    punktzahl++;
  } else {
    buttons[auswahl].classList.add("wrong");
    document.getElementById("feedback").innerText = "Falsch";
    falschBeantwortet.push(frageObj);
  }

  document.getElementById("explanation").innerText =
    "Richtige Antwort: " + frageObj.antworten[frageObj.richtig] +
    ". " + (frageObj.erklaerung || "");

  updateProgress();
  document.getElementById("nextBtn").classList.remove("hidden");
}

function zeitAbgelaufen() {
  if (beantwortet) return;
  beantwortet = true;

  const frageObj = aktuelleFragen[index];
  const buttons = document.querySelectorAll(".answer-btn");

  buttons.forEach((btn, i) => {
    btn.classList.add("disabled");
    if (i === frageObj.richtig) btn.classList.add("correct");
  });

  document.getElementById("feedback").innerText = "Zeit abgelaufen";
  document.getElementById("explanation").innerText =
    "Richtige Antwort: " + frageObj.antworten[frageObj.richtig] +
    ". " + (frageObj.erklaerung || "");

  falschBeantwortet.push(frageObj);
  updateProgress();
  document.getElementById("nextBtn").classList.remove("hidden");
}

function nextQuestion() {
  index++;
  zeigeFrage();
}

function quizBeenden() {
  document.getElementById("quizBox").classList.add("hidden");
  const result = document.getElementById("result");
  result.classList.remove("hidden");
  const prozent = Math.round((punktzahl / fragen.length) * 100);

  result.innerHTML =
    "<h2>Quiz beendet</h2>" +
    "<p>Direkt richtig beantwortet: " + punktzahl + " von " + fragen.length + "</p>" +
    "<p>Ergebnis im ersten Durchgang: " + prozent + " Prozent</p>" +
    "<p>Insgesamt gestellte Fragen inklusive Wiederholungen: " + gesamtGestellt + "</p>" +
    "<p>Alle falsch beantworteten Fragen wurden wiederholt, bis sie richtig beantwortet waren.</p>";
}

zeigeFrage();
</script>
