<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anästhesie & Schockraum</title>
<style>
body {font-family: Arial; background:#111; color:#fff; text-align:center; padding:20px;}
button {padding:15px; margin:10px; width:90%; font-size:16px;}
.hidden {display:none;}
</style>
</head>
<body>

<h1>Anästhesie & Schockraum</h1>
<p>Exkurs: internistischer Schockraum</p>

<div id="start">
<button onclick="start()">Start</button>
</div>

<div id="quiz" class="hidden">
<p id="frage"></p>
<div id="antworten"></div>
<p id="timer"></p>
</div>

<script>
let fragen = [
{
frage: "Warum ist der Atemweg bei bewusstlosen Patienten gefährdet?",
antworten: [
"Die Zunge fällt zurück",
"Kein Gasaustausch findet statt",
"Jeder muss intubiert werden",
"Nur EKG zeigt Sicherheit"
],
richtig: 0
},
{
frage: "Welche Maßnahme sollte bei RSI vermieden werden?",
antworten: [
"Präoxygenierung",
"Zwischenbeatmung",
"Teamkommunikation",
"Laryngoskopie"
],
richtig: 1
},
{
frage: "Was verbessert die Gerinnung im Schockraum?",
antworten: [
"Auskühlen lassen",
"Wärmeerhalt",
"Volumen ohne Kontrolle",
"Selen hochdosiert"
],
richtig: 1
}
];

let index = 0;
let falsch = [];
let zeit;

function start(){
document.getElementById("start").classList.add("hidden");
document.getElementById("quiz").classList.remove("hidden");
zeigeFrage();
}

function zeigeFrage(){
if(index >= fragen.length){
if(falsch.length > 0){
fragen = falsch;
falsch = [];
index = 0;
alert("Fehlerfragen kommen erneut");
} else {
alert("Fertig");
return;
}
}

let f = fragen[index];
document.getElementById("frage").innerText = f.frage;

let html = "";
f.antworten.forEach((a,i)=>{
html += `<button onclick="check(${i})">${a}</button>`;
});
document.getElementById("antworten").innerHTML = html;

let t = 120;
clearInterval(zeit);
zeit = setInterval(()=>{
t--;
document.getElementById("timer").innerText = "Zeit: " + t;
if(t<=0){
falsch.push(f);
index++;
zeigeFrage();
}
},1000);
}

function check(i){
clearInterval(zeit);
if(i !== fragen[index].richtig){
falsch.push(fragen[index]);
}
index++;
zeigeFrage();
}
</script>

</body>
</html>
